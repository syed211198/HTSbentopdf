{{#if simpleMode}} {{> navbar-simple}} {{else}}
<nav class="bg-gray-800 border-b border-gray-700 sticky top-0 z-30">
  <div class="container mx-auto px-4">
    <div class="flex justify-between items-center h-16">
      <div
        class="flex-shrink-0 flex items-center cursor-pointer"
        id="home-logo"
      >
        <img
          id="nav-logo"
          src="{{baseUrl}}{{#if brandLogo}}{{brandLogo}}{{else}}images/hts-logo.png{{/if}}"
          alt="{{#if brandName}}{{brandName}}{{else}}Bento PDF{{/if}} Logo"
          class="h-8 w-8"
        />
        <span id="nav-brand" class="text-white font-bold text-xl ml-2">
          <a href="index.html"
            >{{#if brandName}}{{brandName}}{{else}}HTS BentoPDF{{/if}}</a
          >
        </span>
      </div>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex items-center space-x-8">
        <a href="index.html" class="nav-link" data-i18n="nav.home">Home</a>
        <a href="about.html" class="nav-link" data-i18n="nav.about">About</a>
        <!-- <a href="contact.html" class="nav-link" data-i18n="nav.contact"
          >Contact</a
        > -->
        <!-- <a href="licensing.html" class="nav-link" data-i18n="nav.licensing"
          >Licensing</a
        > -->
        <a
          href="https://bentopdf.com/docs/"
          class="nav-link"
          data-i18n="nav.docs"
          >Docs</a
        >
      </div>

      <!-- Mobile Hamburger Button -->
      <button
        type="button"
        class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-white hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-white md:hidden"
        aria-controls="mobile-menu"
        aria-expanded="false"
      >
        <span class="sr-only">Open main menu</span>
        <svg
          class="h-6 w-6"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          aria-hidden="true"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile Menu Dropdown -->
  <div
    id="mobile-menu"
    class="hidden md:hidden bg-gray-800 border-t border-gray-700"
  >
    <div class="px-2 pt-2 pb-3 space-y-1 text-center">
      <a href="index.html" class="mobile-nav-link" data-i18n="nav.home">Home</a>
      <a href="about.html" class="mobile-nav-link" data-i18n="nav.about"
        >About</a
      >
      <a href="contact.html" class="mobile-nav-link" data-i18n="nav.contact"
        >Contact</a
      >
      <!-- <a href="licensing.html" class="mobile-nav-link" data-i18n="nav.licensing"
        >Licensing</a
      > -->
      <a
        href="https://bentopdf.com/docs/"
        class="mobile-nav-link"
        data-i18n="nav.docs"
        >Docs</a
      >
    </div>
