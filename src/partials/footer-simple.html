<footer
  class="mt-16 border-t-2 border-emerald-800 py-8"
  data-simple-footer="true"
>
  <div class="container mx-auto px-4">
    <div class="flex items-center justify-between flex-wrap gap-4">
      <div>
        <div class="flex items-center mb-2">
          <img
            id="footer-logo"
            src="{{baseUrl}}{{#if brandLogo}}{{brandLogo}}{{else}}images/hts-logo.png{{/if}}"
            alt="{{#if brandName}}{{brandName}}{{else}}HTS BentoPDF{{/if}} Logo"
            class="h-8 w-8 mr-2"
          />
          <span id="footer-brand" class="text-white font-bold text-lg"
            >{{#if brandName}}{{brandName}}{{else}}HTS BentoPDF{{/if}}</span
          >
        </div>
        <p id="footer-copyright" class="text-emerald-400 text-sm">
          {{#if footerText}}{{footerText}}{{else}}&copy; 2026 HTS BentoPDF. All
          rights reserved.{{/if}}
        </p>
        <p class="text-gray-500 text-xs mt-2">
          <span data-i18n="footer.version">Version</span>
          <span id="app-version">{{appVersion}}</span>
        </p>
      </div>
      <div id="simple-mode-lang-switcher" class="flex-shrink-0"></div>
    </div>
  </div>
</footer>
